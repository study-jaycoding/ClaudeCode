<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 뷰어</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <header>
        <h1>프로젝트 뷰어</h1>
        <div class="toolbar">
            <label for="project-select">프로젝트</label>
            <select id="project-select">
                <option value="">(불러오는 중...)</option>
            </select>
            <button id="refresh-btn" type="button" class="secondary">새로고침</button>
        </div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <!-- 사이드바 탭: 트리 / 즐겨찾기 -->
            <div class="sidebar-tabs">
                <button class="tab-btn active" type="button" data-tab="tree">📂 트리</button>
                <button class="tab-btn" type="button" data-tab="favorites">⭐ 즐겨찾기 <span id="fav-count" class="fav-count">0</span></button>
            </div>

            <div class="tab-panel" id="tab-tree">
                <ul id="file-tree" class="tree">
                    <li class="empty">프로젝트를 선택하세요</li>
                </ul>
            </div>

            <div class="tab-panel hidden" id="tab-favorites">
                <ul id="favorites-list" class="favorites">
                    <li class="empty">즐겨찾기가 비어 있습니다</li>
                </ul>
            </div>
        </aside>

        <section class="preview">
            <div id="preview-info" class="preview-info">프로젝트를 선택하거나 파일을 끌어다 놓으세요</div>
            <div id="preview-content" class="preview-content"></div>
        </section>
    </main>

    <!-- 드래그앤드롭 오버레이 -->
    <div id="drop-overlay" class="drop-overlay hidden">
        <div class="drop-card">
            <div class="drop-icon">⬇</div>
            <div class="drop-text">파일을 놓으면 현재 폴더에 업로드됩니다</div>
            <div class="drop-target" id="drop-target">(대상 표시)</div>
        </div>
    </div>

    <!-- 라이트박스 (이미지/영상 확대) -->
    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close" type="button" title="닫기 (Esc)">✕</button>
        <div class="lightbox-stage" id="lightbox-stage"></div>
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
