<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프로젝트 매니저</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <main>
        <h1>프로젝트 매니저</h1>

        <!-- 새 프로젝트 생성 영역 -->
        <section class="card">
            <h2>새 프로젝트 만들기</h2>
            <form id="create-form" autocomplete="off">
                <input
                    type="text"
                    id="project-name"
                    name="name"
                    placeholder="프로젝트 이름을 입력하세요"
                    maxlength="50"
                    required
                />
                <button type="submit">생성</button>
            </form>
            <p id="message" class="message"></p>
            <p class="hint">한글/영문/숫자/공백/하이픈/언더스코어, 1~50자</p>
        </section>

        <!-- 기존 프로젝트 목록 영역 -->
        <section class="card">
            <div class="list-header">
                <h2>프로젝트 목록</h2>
                <button id="refresh-btn" type="button" class="secondary">새로고침</button>
            </div>
            <ul id="project-list" class="project-list">
                <li class="empty">불러오는 중...</li>
            </ul>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
